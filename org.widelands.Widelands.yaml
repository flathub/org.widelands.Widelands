app-id: org.widelands.Widelands
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: widelands
finish-args:
  # wayland
  - --socket=wayland
  - --env=SDL_VIDEODRIVER=wayland,x11
  # X11 + XShm access
  - --share=ipc
  - --socket=fallback-x11
  # Play sounds
  - --socket=pulseaudio
  # Needs to talk to the network
  - --share=network
  # Persistent storage only under ~/.var/app/org.widelands.Widelands/.widelands
  - --persist=.widelands
  # OpenGL access
  - --device=dri
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - '*.la'
  - '*.a'
modules:
  - shared-modules/SDL2/SDL2_image.json
  - shared-modules/SDL2/SDL2_ttf.json
  - shared-modules/glu/glu-9.json
  - shared-modules/glew/glew.json

  - name: asio
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/asio/asio/1.36.0%20%28Stable%29/asio-1.36.0.tar.bz2
        sha256: 7bf4dbe3c1ccd9cc4c94e6e6be026dcc2110f9201d286bb9500dc85d69825524
    # This is to skip the 'make' step (building the examples), because
    # I couldn't figure out how to do it using the default buildsystem
    buildsystem: simple
    build-commands:
      - |
        # This all could be just a 'cp -a', but let's have the better
        # error handling of GNU 'install'
        ./configure --prefix=${FLATPAK_DEST}
        make install-data


  ####### Widelands #######

  - name: Widelands
    sources:
      - type: archive
        url: https://github.com/widelands/widelands/archive/refs/tags/v1.3.1.tar.gz
        sha256: e6f3e8f4fcafd367962dbacde80e26fc63afad38cfe26fadba9c92d4a01bd687

      - type: shell
        commands:
        - |
          # Modify xdg/org.widelands.Widelands.metainfo.xml:
          #  * Remove the binary from provides, because flatpak doesn't export it
          sed '/<binary>/d' -i xdg/org.widelands.Widelands.metainfo.xml

          # Validate metainfo.xml with the changes
          appstreamcli validate --no-net xdg/org.widelands.Widelands.metainfo.xml

    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DOPTION_BUILD_WEBSITE_TOOLS=OFF
      # flatpak-builder-lint says this is redundant, but keep it for reference
      # -DCMAKE_INSTALL_PREFIX=/app
      - -DWL_INSTALL_BINDIR=/app/bin
      - -DWL_INSTALL_BASEDIR=/app/share/widelands
      - -DWL_INSTALL_DATADIR=/app/share/widelands
      - -DGLEW_ROOT=/app
      - -DGLEW_INCLUDE_DIR=/app/include/GL
      # Fix an issue with linking libs
      # https://www.widelands.org/forum/topic/1343/?page=3#post-9857
      - -DGLEW_LIBRARY:FILEPATH=/app/lib/libGLEW.a
      # cmake ignores CPLUS_INCLUDE_PATH where Asio is installed
      - -DCMAKE_INCLUDE_PATH=/app/include
      - -DOPENGL_glu_LIBRARY=/app/lib/libGLU.a
    build-options:
      ldflags: -lGL

